    <main style="display: flex;
  justify-content: center;
  align-items: center; margin-top: 1rem;">

        <div style="height: 80vh; width: 80vw;" id="map"></div>
        <script type="module">

            fetch('./geoJson.json')
                .then(response => response.json())
                .then(data => {
                    // console.log(data);
                

            var map = L.map('map').setView([51.6205, 0.3072], 7);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);

    
            L.geoJSON(data, {
                    style: function (feature) {
                        return { color: feature.properties.color };
                    }
                }).bindPopup(function (layer) {
                    return layer.feature.properties.description;
                }).addTo(map);

                const latlngs = data.features.map(feature => [feature.geometry.coordinates[1], feature.geometry.coordinates[0]]);
                L.polyline(latlngs, {
                    color: 'red'
                }).addTo(map);
            });
        </script>
    </main>
